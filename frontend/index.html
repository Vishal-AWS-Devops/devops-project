<h1>Hello from Vishal Devops Server</h1>
<p>Docker Compose Working Successfully</p>

<p id="visits">Loading visits...</p>

<script>
async function fetchVisits() {
  try {
    const res = await fetch('/api/');
    const text = await res.text();
    document.getElementById('visits').innerHTML = text;
  } catch (err) {
    document.getElementById('visits').innerHTML = 'Backend not reachable';
  }
}
fetchVisits();
</script>
