version: '3.9'

services:

  web:
    image: nginx
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT}:5000"
    depends_on:
      - redis

  redis:
    image: redis
    ports:
      - "${REDIS_PORT}:6379"
